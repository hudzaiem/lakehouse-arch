
x-gcs-env: &gcs-env
  GCS_CREDENTIALS_JSON: ${GCS_CREDENTIALS_JSON}

services:
  # ----------------------------------------------------------------
  # ICEBERG CATALOG — Nessie (Git-like versioning)
  # ----------------------------------------------------------------
  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      - NESSIE_VERSION_STORE_TYPE=IN_MEMORY
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.15'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # STREAM PROCESSING — Apache Flink
  # ----------------------------------------------------------------
  flink-jobmanager:
    image: flink:1.20-java17
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      <<: *gcs-env
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka-1:29092,kafka-2:29092,kafka-3:29092}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}
      KAFKA_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";'
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 768m
        state.backend.type: hashmap
        state.checkpoints.dir: s3://${GCS_BUCKET}/checkpoints
        execution.checkpointing.interval: 60000
        s3.endpoint: https://storage.googleapis.com
        s3.path.style.access: false
    volumes:
      - ./flink/lib:/opt/flink/lib/custom
      - ./flink/sql:/opt/flink/sql
      - ./flink/entrypoint.sh:/opt/flink/entrypoint-gcs.sh:ro
    entrypoint: ["/bin/bash", "/opt/flink/entrypoint-gcs.sh", "jobmanager"]
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.25'
    depends_on:
      nessie:
        condition: service_healthy

  flink-taskmanager:
    image: flink:1.20-java17
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      <<: *gcs-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1536m
        taskmanager.numberOfTaskSlots: 2
        state.backend.type: hashmap
        state.checkpoints.dir: s3://${GCS_BUCKET}/checkpoints
        execution.checkpointing.interval: 60000
        s3.endpoint: https://storage.googleapis.com
        s3.path.style.access: false
    volumes:
      - ./flink/lib:/opt/flink/lib/custom
      - ./flink/entrypoint.sh:/opt/flink/entrypoint-gcs.sh:ro
    entrypoint: ["/bin/bash", "/opt/flink/entrypoint-gcs.sh", "taskmanager"]
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '0.40'
    depends_on:
      - flink-jobmanager

  # ----------------------------------------------------------------
  # QUERY ENGINE — Trino
  # ----------------------------------------------------------------
  trino:
    image: trinodb/trino:459
    container_name: trino
    ports:
      - "8085:8080"
    environment:
      <<: *gcs-env
    volumes:
      - ./trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
      - ./trino/entrypoint.sh:/usr/lib/trino/entrypoint-gcs.sh:ro
    entrypoint: ["/bin/bash", "/usr/lib/trino/entrypoint-gcs.sh"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.30'
    depends_on:
      nessie:
        condition: service_healthy

  # ----------------------------------------------------------------
  # DATA CATALOG — OpenMetadata
  # ----------------------------------------------------------------
  openmetadata-db:
    image: mysql:8.0
    container_name: openmetadata-db
    environment:
      MYSQL_ROOT_PASSWORD: openmetadata_password
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_password
      MYSQL_DATABASE: openmetadata_db
    volumes:
      - openmetadata-db-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.15'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-popenmetadata_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: openmetadata-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms384m -Xmx384m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  openmetadata:
    image: docker.io/openmetadata/server:1.6.1
    container_name: openmetadata
    ports:
      - "8585:8585"
    environment:
      OPENMETADATA_CLUSTER_NAME: lakehouse
      SERVER_HOST_API_URL: http://openmetadata:8585/api
      # Database
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_HOST: openmetadata-db
      DB_PORT: 3306
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      DB_SCHEMA: openmetadata_db
      # Elasticsearch
      SEARCH_TYPE: elasticsearch
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      # Auth (basic for local dev)
      AUTHENTICATION_PROVIDER: basic
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-metadata.org"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.25'
    depends_on:
      openmetadata-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8585/api/v1/system/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  openmetadata-ingestion:
    image: docker.io/openmetadata/ingestion:1.6.1
    container_name: openmetadata-ingestion
    ports:
      - "8380:8080"
    environment:
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: /opt/airflow/dag_generated_configs
      DB_HOST: openmetadata-db
      DB_PORT: 3306
      DB_USER: openmetadata_user
      DB_PASSWORD: openmetadata_password
      DB_SCHEME: mysql+pymysql
      DB_DATABASE: openmetadata_db
      AIRFLOW_DB_HOST: openmetadata-db
      AIRFLOW_DB_PORT: 3306
      AIRFLOW_DB_USER: openmetadata_user
      AIRFLOW_DB_PASSWORD: openmetadata_password
      AIRFLOW_DB_SCHEME: mysql+pymysql
      AIRFLOW_DB_DATABASE: airflow_db
    volumes:
      - openmetadata-ingestion-data:/opt/airflow/dag_generated_configs
      - openmetadata-ingestion-logs:/opt/airflow/logs
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.15'
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata:
        condition: service_healthy

volumes:
  openmetadata-db-data:
  elasticsearch-data:
  openmetadata-ingestion-data:
  openmetadata-ingestion-logs:

